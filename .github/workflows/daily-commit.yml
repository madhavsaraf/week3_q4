name: Daily Auto Commit

on:
  schedule:
    - cron: "30 14 * * *" # Runs daily at 2:30 PM UTC (8:00 PM IST)
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log - 22f3002489@ds.study.iitm.ac.in
        run: |
          echo "Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-log.txt
          git commit -m "Daily auto-commit: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
